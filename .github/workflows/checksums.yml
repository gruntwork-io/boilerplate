name: Generate SHA256 Checksums

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  checksums:
    name: Generate SHA256 checksums
    runs-on: ubuntu-latest
    steps:
      - name: Download source archive
        run: |
          curl -sfL \
            "https://github.com/${{ github.repository }}/archive/refs/tags/${{ github.event.release.tag_name }}.tar.gz" \
            -o source.tar.gz

      - name: Download release binary assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets
          gh release download "${{ github.event.release.tag_name }}" \
            --repo "${{ github.repository }}" \
            --dir assets || true

      - name: Generate checksums
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          {
            echo "# Source archive"
            sha256sum source.tar.gz | sed "s|source.tar.gz|${{ github.event.repository.name }}-${TAG#v}.tar.gz|"

            if [ -n "$(ls -A assets/ 2>/dev/null)" ]; then
              echo ""
              echo "# Binaries"
              (cd assets && sha256sum *)
            fi
          } > SHA256SUMS

          cat SHA256SUMS

      - name: Upload checksums to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" SHA256SUMS \
            --repo "${{ github.repository }}" \
            --clobber

      - name: Print source archive SHA256 for Homebrew
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          echo "::notice::Homebrew sha256 for ${TAG}: $(sha256sum source.tar.gz | cut -d' ' -f1)"
