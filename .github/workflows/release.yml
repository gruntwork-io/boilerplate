# Builds, signs, and uploads release binaries when a version tag is pushed.
# Expects a GitHub Release to already exist (created via the Releases page).

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Gate: lint and spell-check ────────────────────────────────
  lint:
    uses: ./.github/workflows/lint.yml
    secrets: inherit

  codespell:
    uses: ./.github/workflows/codespell.yml
    secrets: inherit

  # ── Gate: run all tests ───────────────────────────────────────
  base_tests:
    needs: [lint, codespell]
    uses: ./.github/workflows/base-test.yml
    permissions:
      contents: read
      checks: write
    secrets: inherit

  windows_tests:
    needs: [lint, codespell]
    uses: ./.github/workflows/windows-test.yml
    secrets: inherit

  # ── Build cross-platform binaries ─────────────────────────────
  build:
    needs: [lint, codespell]
    uses: ./.github/workflows/build.yml
    secrets: inherit

  # ── Sign macOS binaries ───────────────────────────────────────
  sign-macos:
    needs: [base_tests, windows_tests, build]
    uses: ./.github/workflows/sign-macos.yml
    secrets: inherit

  # ── Upload assets to existing GitHub Release ─────────────────
  upload-assets:
    name: Upload Release Assets
    needs: [sign-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: boilerplate_*
          path: binaries/
          merge-multiple: true

      - name: List release assets
        run: |
          echo "Files to be uploaded:"
          ls -lh binaries/

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" binaries/* --repo "${{ github.repository }}"
